name: "CI Resource Sweeper"
on:
  schedule:
    # Run hourly to catch stale resources from failed CI runs.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      ttl_hours:
        description: "TTL in hours (resources older than this are swept)"
        required: false
        default: "4"
      dry_run:
        description: "Show what would be cleaned without doing it"
        required: false
        type: boolean
        default: false

jobs:
  sweep:
    name: Sweep Stale CI Resources
    runs-on: [self-hosted, linux, x64, aws, quad-xlarge]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sweep CI resources
        shell: bash
        env:
          TTL_HOURS: ${{ github.event.inputs.ttl_hours || '4' }}
        run: |
          args=("--ttl-hours" "${TTL_HOURS}")
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            args+=("--dry-run")
          fi
          chmod +x tests/ci-sweeper.sh
          tests/ci-sweeper.sh "${args[@]}"
